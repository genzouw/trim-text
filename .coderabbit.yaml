# CodeRabbit configuration
# https://docs.coderabbit.ai/reference/configuration

language: ja-JP
tone_instructions: "すべての投稿、コメント、レビューは必ず日本語で行ってください。セキュリティ、パフォーマンス、可読性、設計の妥当性に加え、命名規則、マジックナンバー、将来のリファクタリングを見据えた設計改善など、細部まで厳格に評価し、具体的な改善案を提案してください。"
early_access: false
enable_free_tier: true

reviews:
  # レビュー観点を厳しめに設定するため "assertive" に設定。
  profile: assertive

  # PR 全体に対する指針として設定する。
  # path_instructions で "**/*" を指定するとファイルごとに繰り返し適用され
  # ノイズが増えるため、広範な指示は instructions に集約する。
  instructions: |
    変更がプロジェクト全体に与える影響や、Docker イメージとして利用される前提を踏まえた観点でコードレビューを行ってください。必ず日本語でコメントしてください。
    本リポジトリは Bash スクリプト (`tt`) と、それを内包する Docker イメージを配布する性質があります。
    シェルスクリプトのポータビリティ・安全性（クォート、変数展開、`set` オプション、外部入力の取り扱い）、
    および Dockerfile のベストプラクティス（ベースイメージのバージョン固定、最小権限、不要パッケージの排除）を重視してください。

  # CodeRabbit を bot reviewer として動作させる。
  # 問題なしと判断した PR に対して Approve ステータスを返す。
  # 個人運営での self-merge 運用 (PR 作成者は自分の PR を承認できない GitHub 仕様)
  # を補助する目的で有効化。Approve は最終判断ではなく補助。
  request_changes_workflow: true

  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - main

  path_instructions:
    - path: "tt"
      instructions: |
        Bash スクリプトとして以下の観点を強調してレビューしてください：
        - `set -euo pipefail` 相当の安全策が機能しているか
        - 変数の引用 (`"${VAR}"`) と、外部入力（標準入力、引数）に対する適切な検証
        - `sed`, `head`, `tail` などの GNU 拡張依存箇所（BSD 系 macOS との互換性）
        - 数値引数のサニタイズ不足によるコマンドインジェクションの可能性
    - path: "Dockerfile"
      instructions: |
        Dockerfile として以下の観点を強調してレビューしてください：
        - ベースイメージのバージョン固定とサポート状況（古い alpine など）
        - レイヤ削減、不要パッケージの非インストール、`--no-cache` 等の利用
        - 実行ユーザーが root のままになっていないか
        - `COPY` の対象範囲が広すぎないか、`.dockerignore` の検討

  # 生成物 / 依存物 / ロックファイルなどはレビュー対象から除外する。
  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!node_modules/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/*.map"

  abort_on_close: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false

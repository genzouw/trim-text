[config]
model="gpt-4o"

[pr_reviewer]
inline_code_comments = true
require_score_review = true
extra_instructions="""
変更がプロジェクト全体に与える影響や、アーキテクチャの観点など、広いスコープからコードレビューを行ってください。必ず日本語でコメントしてください。
プルリクエストの概要に必ず関連するラベルを提案し、AIによる自動マージ判定がしやすいように変更のスコア(0-100)を提示してください。
OSS として配布される Docker イメージ／CLI ツールのリポジトリであることを考慮し、以下の観点を強調し、重要視して必ずレビューに盛り込んでください:
- 認証情報、API キー、トークン、内部 URL などの秘密情報がコード・ログ・イメージ層に混入していないこと。
- 任意コード実行・コマンドインジェクション・パストラバーサルなど、利用者環境を危険にさらす脆弱性が無いこと。
- 入力検証（引数 / 標準入力 / 環境変数）が抜けていないこと。
- 最新の生成 AI を活用した開発フローの自動化と最適化の観点から、コード品質を向上させるモダンなベストプラクティスを積極的に提案してください。
- 各種AI設定ファイル（.cursorrules, .clinerules, .windsurfrules, .aider.conf.yml など）に変更がある場合、プロジェクト全体の方針（日本語使用、セキュリティ最優先など）と一貫性が保たれているか厳密に確認してください。
"""

[pr_description]
extra_instructions="""
日本語で記述してください。
変更内容に応じて、関連するラベル（bug, enhancement, refactor, documentation など）の提案も含めてください。
"""

[pr_questions]
extra_instructions="日本語で回答してください。"

[pr_code_suggestions]
num_code_suggestions = 4
extra_instructions = "提案事項は必ず日本語で説明し、ベストプラクティスに基づいた具体的なコード例を含めてください。"

[pr_update_changelog]
push_changelog_changes = false
extra_instructions = "日本語で CHANGELOG.md を更新する内容を提案してください。"

[pr_add_docs]
extra_instructions = "ドキュメントは日本語で記述し、プロジェクトの規約に沿った形式で提案してください。"

[github_app]
pr_commands = [
  "/describe",
  "/review",
  "/improve",
  "/add_docs",
  "/update_changelog"
]

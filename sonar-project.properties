sonar.projectKey=genzouw_trim-text
sonar.organization=genzouw
sonar.host.url=https://sonarcloud.io

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=trim-text

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# This property is optional if sonar.modules is set.
sonar.sources=.
sonar.shell.file.suffixes=.sh,.bash,.ksh,.zsh,

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Exclude test directories and coverage files if any
sonar.exclusions=**/*.test.*,**/*.spec.*,coverage/**,.github/**,.coderabbit.yaml,.pr_agent.toml,sonar-project.properties

# Rule-level exclusions
# docker:S8431 (use either version tag or digest, not both) を Dockerfile で抑制する。
# OpenSSF Scorecard の Pinned-Dependencies 要件で digest をピンする一方、
# Dependabot の docker エコシステムが tag+digest 併記形式で更新提案できるよう
# 意図的に両方を残しているため。
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S8431
sonar.issue.ignore.multicriteria.e1.resourceKey=Dockerfile

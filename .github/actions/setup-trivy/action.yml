name: "Setup Trivy"
description: "Downloads, validates, extracts, and caches Trivy and its DB"
inputs:
  version:
    description: "The version of Trivy to install"
    required: true
runs:
  using: "composite"
  steps:
    - name: Cache Trivy binary
      id: cache-trivy
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/trivy
        key: trivy-bin-${{ runner.os }}-${{ inputs.version }}

    - name: Install Trivy
      if: steps.cache-trivy.outputs.cache-hit != 'true'
      working-directory: ${{ runner.temp }}
      shell: bash
      env:
        TRIVY_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        curl --fail --silent --show-error --location \
          --retry 5 --retry-all-errors --retry-delay 5 --retry-max-time 300 \
          --connect-timeout 10 --max-time 120 \
          -o trivy.tar.gz \
          "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
        curl --fail --silent --show-error --location \
          --retry 5 --retry-all-errors --retry-delay 5 --retry-max-time 300 \
          --connect-timeout 10 --max-time 120 \
          -o trivy_checksums.txt \
          "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
        expected_sha=$(awk -v target="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" '$2 == target {print $1}' trivy_checksums.txt)
        if [ -z "${expected_sha}" ]; then
          echo "::error::expected SHA256 not found in trivy checksums.txt"
          exit 1
        fi
        echo "${expected_sha}  trivy.tar.gz" | sha256sum -c -
        tar xzf trivy.tar.gz trivy
        ./trivy --version

    - name: Cache Trivy vulnerability DB
      uses: actions/cache@v4
      with:
        path: ~/.cache/trivy
        key: trivy-db-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          trivy-db-${{ runner.os }}-

# Dependabot configuration for automatic dependency updates
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions のバージョン更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    pull-request-branch-name:
      separator: /

  # Dockerfile のベースイメージ更新 (alpine など)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    target-branch: main
    reviewers:
      - genzouw
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
    pull-request-branch-name:
      separator: /

name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: commitlint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Commit Message Lint
    # commitlint を許容する PR 作成者の allowlist。
    # 例えば dependabot が生成するコミット本文は長い URL を含み body-max-line-length に違反するため
    # ここで列挙した作成者の PR ではジョブ自体をスキップして success として扱う。
    # 作成者を追加したい場合は JSON 配列に '<login>' を追記する。
    if: ${{ !contains(fromJSON('["dependabot[bot]"]'), github.event.pull_request.user.login) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

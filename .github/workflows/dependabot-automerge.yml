name: Dependabot auto-merge

on: pull_request

# GITHUB_TOKEN の最小権限をワークフロー全体で読み取り専用にし、
# 必要なジョブだけが明示的に書き込み権限を付与する形にする
# (OpenSSF Scorecard Token-Permissions / alert #23)。
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dependabot:
    name: Dependabot 自動マージ
    runs-on: ubuntu-latest
    permissions:
      # Dependabot PRのメタデータ取得と自動マージ設定のため
      pull-requests: write
      # squash マージ実行のため
      contents: write
    # Dependabot が作成した PR のみで実行
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.user.type == 'Bot'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        # CI (他のチェック) が通った後に自動マージされるように設定
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          # ブランチ保護ルールでレビューが必須になっている場合に対処するため、先に Approve する
          gh pr review --approve "$PR_URL" || echo "Already approved"
          # リポジトリ設定で allow_merge_commit=false / required_linear_history=true のため
          # --merge ではなく --squash を使う（dependabot PR は通常 1 commit のため見た目は同じ）
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

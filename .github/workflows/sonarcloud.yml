name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # allows actions/checkout to fetch repository contents
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  Analysis:
    # SonarCloud スキャンを許容する PR 作成者の allowlist。
    # dependabot 起動の workflow run では Dependabot scope secrets が使われ
    # SONAR_TOKEN が空になり "Project not found" で失敗するため、
    # ここで列挙した作成者の pull_request イベントではジョブ自体をスキップする。
    # push / workflow_dispatch では pull_request コンテキストが無く login は空文字となり、
    # allowlist に一致しないので通常通り実行される。
    # 作成者を追加したい場合は JSON 配列に '<login>' を追記する。
    if: ${{ !contains(fromJSON('["dependabot[bot]"]'), github.event.pull_request.user.login) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Analyze with SonarQube
        # sonarcloud-github-action is archived; migrated to sonarqube-scan-action.
        # projectKey/organization are defined in sonar-project.properties.
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

name: Scorecard supply-chain security

on:
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#branch-protection
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard/blob/main/docs/checks.md#maintained
  schedule:
    - cron: "27 15 * * 5"
  push:
    branches: ["main"]

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      # Uncomment the permissions below if installing in a private repository.
      # contents: read
      # actions: read

    # NOTE: The Scorecard publishing webapp verifies that this job contains
    # ONLY `uses:` steps (no `run:` steps). Adding a `run:` step here will
    # break sigstore signing with:
    #   "scorecard job must only have steps with `uses`"
    # See: https://github.com/ossf/scorecard-action#workflow-restrictions
    # SARIF post-processing (e.g. filtering checks) must live in a separate job.
    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) "write" PAT token. Uncomment the `repo_token` line below if:
          # - you want to enable the Branch-Protection check on a *public* repository, or
          # - you are installing Scorecard on a *private* repository
          # To create the PAT, follow the steps in https://github.com/ossf/scorecard-action?tab=readme-ov-file#authentication-with-pat.
          # repo_token: ${{ secrets.SCORECARD_TOKEN }}

          # Public repositories:
          #   - Publish results to OpenSSF REST API for easy access by consumers
          #   - Allows the repository to include the Scorecard badge.
          #   - See https://github.com/ossf/scorecard-action#publishing-results.
          # For private repositories:
          #   - `publish_results` will always be set to `false`, regardless
          #     of the value entered here.
          publish_results: true

      # Upload the raw (unfiltered) SARIF as an artifact so the downstream
      # job can post-process and forward it to Code Scanning.
      - name: "Upload artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

  # Post-process and forward to Code Scanning in a separate job, because the
  # `analysis` job above must remain `uses:`-only for sigstore signing.
  upload-code-scanning:
    name: Filter and upload SARIF to Code Scanning
    needs: analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
    steps:
      - name: "Download SARIF artifact"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: SARIF file

      # Filter out the Code-Review check from the SARIF before forwarding to
      # Code Scanning. Rationale: this is a solo-maintained repository, so
      # committer == merger for most changes, making the Scorecard Code-Review
      # check structurally unsatisfiable. The recurring high-severity Code
      # Scanning alert it produces does not reflect real risk, so we suppress
      # it from the Code Scanning dashboard while keeping the check running
      # for the OpenSSF Scorecard badge / observability.
      - name: "Filter Code-Review check from SARIF"
        run: |
          jq '(.runs[].results) |= map(select(.ruleId != "CodeReviewID"))
              | (.runs[].tool.driver.rules) |= map(select(.id != "CodeReviewID"))' \
              results.sarif > results.filtered.sarif
          mv results.filtered.sarif results.sarif

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif

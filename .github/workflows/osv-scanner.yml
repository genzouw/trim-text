name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎週月曜 06:00 JST (= 日曜 21:00 UTC) に再スキャン
    - cron: "0 21 * * 0"
  workflow_dispatch:

concurrency:
  group: osv-scanner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scanner:
    name: Run OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@19ec1116569a47416e11a45848722b1af31a857b
        with:
          scan-args: |-
            -r
            .

name: Repomix Pages

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Generate llms.txt for GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Run Repomix (Markdown for llms.txt)
        # ${{ vars.INDEXNOW_KEY }} を run 本文に直接展開すると zizmor の template-injection 警告対象になるため、
        # env 経由でシェル変数として参照し、コード注入リスクを抑制する。
        env:
          INDEXNOW_KEY: ${{ vars.INDEXNOW_KEY }}
        run: |
          mkdir -p public
          npx --yes repomix --output public/llms-full.txt --style markdown
          echo "# trim-text Context" > public/llms.txt
          echo "This repository contains the trim-text CLI tool. See [llms-full.txt](llms-full.txt) for the full context." >> public/llms.txt

          # AI検索エンジン向けにインデックス・サイトマップ・robots.txtを生成
          cat << 'HTML' > public/index.html
          <!DOCTYPE html><html><head><title>trim-text AI Context</title></head><body><h1>trim-text AI Context</h1><p>See <a href="llms.txt">llms.txt</a> or <a href="llms-full.txt">llms-full.txt</a></p></body></html>
          HTML
          echo "User-agent: *" > public/robots.txt
          echo "Allow: /" >> public/robots.txt
          echo "Sitemap: https://genzouw.github.io/trim-text/sitemap.xml" >> public/robots.txt
          echo '<?xml version="1.0" encoding="UTF-8"?><urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"><url><loc>https://genzouw.github.io/trim-text/llms.txt</loc></url><url><loc>https://genzouw.github.io/trim-text/llms-full.txt</loc></url></urlset>' > public/sitemap.xml

          # IndexNow key generation for pinging search engines (e.g. Bing)
          echo "$INDEXNOW_KEY" > "public/$INDEXNOW_KEY.txt"

      # Inline upload-pages-artifact: its internal actions/upload-artifact@v4 (unpinned) violates org SHA-pin policy
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory public \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Notify IndexNow
        # ${{ vars.INDEXNOW_KEY }} を run 本文に直接展開すると zizmor の template-injection 警告対象になるため、
        # env 経由でシェル変数として参照する。
        env:
          INDEXNOW_KEY: ${{ vars.INDEXNOW_KEY }}
        run: |
          curl -s "https://api.indexnow.org/indexnow?url=https://genzouw.github.io/trim-text/llms.txt&key=$INDEXNOW_KEY" || true
          curl -s "https://api.indexnow.org/indexnow?url=https://genzouw.github.io/trim-text/llms-full.txt&key=$INDEXNOW_KEY" || true
          curl -s "https://api.indexnow.org/indexnow?url=https://genzouw.github.io/trim-text/&key=$INDEXNOW_KEY" || true

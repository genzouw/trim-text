name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# 既定権限を最小限に絞り、ジョブごとに必要な権限のみ追加する。
permissions: {}

jobs:
  labeler:
    name: Auto Labeler
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # actions/labeler が PR ラベル更新のために必要とする最小権限。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Run Labeler
        uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true

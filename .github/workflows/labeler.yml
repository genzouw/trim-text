name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# 既定権限を最小限に絞り、ジョブごとに必要な権限のみ追加する。
permissions: {}

jobs:
  labeler:
    name: Auto Labeler
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # actions/labeler が PR ラベル更新のために必要とする最小権限。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Run Labeler
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true

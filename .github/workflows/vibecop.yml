name: Vibecop AI Code Quality Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  vibecop:
    name: Vibecop Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Vibecop
        uses: bhvbhushan/vibecop@7bd14c837a04c6c9bf464ff8fadee6d4fbb470ff
        with:
          on-failure: comment-only
          severity-threshold: warning

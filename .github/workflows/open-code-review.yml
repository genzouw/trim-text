name: Open Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open Code Review
        uses: raye-deng/open-code-review@v1
        with:
          sla: 'L1'
          threshold: '60'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          scan-mode: 'diff'

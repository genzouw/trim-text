name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # reviewdog による PR レビューコメント投稿のための最小権限。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup reviewdog
        uses: reviewdog/action-setup@3f401fc1eabe68065b722d3b41d2f786d70bc2db # v1.3.0
        with:
          reviewdog_version: latest

      - name: Run ShellCheck with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shellcheck -f checkstyle tt | reviewdog -f=checkstyle -name="shellcheck" -reporter="github-pr-review" -level="warning" -fail-on-error="true"

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@v3.10.0

      - name: Run shfmt
        run: shfmt -d -i 2 -ci tt

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # reviewdog による PR レビューコメント投稿のための最小権限。
    permissions:
      contents: read
      pull-requests: write
    env:
      HADOLINT_VERSION: v2.12.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install hadolint
        working-directory: ${{ runner.temp }}
        run: |
          set -eu
          # 供給網攻撃対策として公式の .sha256 を併せて取得し整合性検証を行う。
          # 公式 .sha256 ファイルにはオリジナルのファイル名 (hadolint-Linux-x86_64) が
          # 記載されているため、ハッシュのみを抜き出してローカル保存名と照合する。
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            -o hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            -o hadolint.sha256 \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64.sha256"
          expected_sha=$(awk '{print $1}' hadolint.sha256)
          echo "${expected_sha}  hadolint" | sha256sum -c -
          chmod +x hadolint

      - name: Setup reviewdog
        uses: reviewdog/action-setup@3f401fc1eabe68065b722d3b41d2f786d70bc2db # v1.3.0
        with:
          reviewdog_version: latest

      - name: Run hadolint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "${RUNNER_TEMP}/hadolint" -f tty Dockerfile | reviewdog -efm="%f:%l %m" -name="hadolint" -reporter="github-pr-review" -level="warning" -fail-on-error="true"

  actionlint:
    name: actionlint (GitHub Actions workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # reviewdog による PR レビューコメント投稿のための最小権限。
    permissions:
      contents: read
      pull-requests: write
    env:
      ACTIONLINT_VERSION: 1.7.7
      # actionlint v1.7.7 linux_amd64 の公式 SHA256
      # https://github.com/rhysd/actionlint/releases/tag/v1.7.7
      ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        working-directory: ${{ runner.temp }}
        run: |
          set -eu
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint

      - name: Setup reviewdog
        uses: reviewdog/action-setup@3f401fc1eabe68065b722d3b41d2f786d70bc2db # v1.3.0
        with:
          reviewdog_version: latest

      - name: Run actionlint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "${RUNNER_TEMP}/actionlint" -oneline | reviewdog -efm="%f:%l:%c: %m" -name="actionlint" -reporter="github-pr-review" -level="warning" -fail-on-error="true"

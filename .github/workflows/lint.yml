name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # reviewdog のバージョンは再現性確保のため固定する。
  REVIEWDOG_VERSION: 0.21.0
  # reviewdog v0.21.0 linux_amd64 の公式 SHA256
  # https://github.com/reviewdog/reviewdog/releases/tag/v0.21.0
  REVIEWDOG_SHA256: ad5ce7d5ffa52aaa7ec8710a8fa764181b6cecaab843cc791e1cce1680381569

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # reviewdog による PR レビューコメント投稿のための最小権限。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Setup reviewdog
        uses: ./.github/actions/setup-reviewdog
        with:
          version: ${{ env.REVIEWDOG_VERSION }}
          sha256: ${{ env.REVIEWDOG_SHA256 }}

      - name: Run ShellCheck with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shellcheck -f checkstyle tt | "${RUNNER_TEMP}/reviewdog" -f=checkstyle -name="shellcheck" -reporter="github-pr-review" -level="warning" -fail-on-error="true"

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SHFMT_VERSION: 3.10.0
      # shfmt v3.10.0 linux_amd64 の公式 SHA256
      # https://github.com/mvdan/sh/releases/tag/v3.10.0
      SHFMT_SHA256: 1f57a384d59542f8fac5f503da1f3ea44242f46dff969569e80b524d64b71dbc
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Setup shfmt
        uses: ./.github/actions/setup-shfmt
        with:
          version: ${{ env.SHFMT_VERSION }}
          sha256: ${{ env.SHFMT_SHA256 }}

      - name: Run shfmt
        run: |
          "${RUNNER_TEMP}/shfmt" -d -i 2 -ci tt

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # reviewdog による PR レビューコメント投稿のための最小権限。
    permissions:
      contents: read
      pull-requests: write
    env:
      HADOLINT_VERSION: v2.12.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Setup hadolint
        uses: ./.github/actions/setup-hadolint
        with:
          version: ${{ env.HADOLINT_VERSION }}

      - name: Setup reviewdog
        uses: ./.github/actions/setup-reviewdog
        with:
          version: ${{ env.REVIEWDOG_VERSION }}
          sha256: ${{ env.REVIEWDOG_SHA256 }}

      - name: Run hadolint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "${RUNNER_TEMP}/hadolint" -f tty Dockerfile | "${RUNNER_TEMP}/reviewdog" -efm="%f:%l %m" -name="hadolint" -reporter="github-pr-review" -level="warning" -fail-on-error="true"

  actionlint:
    name: actionlint (GitHub Actions workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # reviewdog による PR レビューコメント投稿のための最小権限。
    permissions:
      contents: read
      pull-requests: write
    env:
      ACTIONLINT_VERSION: 1.7.7
      # actionlint v1.7.7 linux_amd64 の公式 SHA256
      # https://github.com/rhysd/actionlint/releases/tag/v1.7.7
      ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Setup actionlint
        uses: ./.github/actions/setup-actionlint
        with:
          version: ${{ env.ACTIONLINT_VERSION }}
          sha256: ${{ env.ACTIONLINT_SHA256 }}

      - name: Setup reviewdog
        uses: ./.github/actions/setup-reviewdog
        with:
          version: ${{ env.REVIEWDOG_VERSION }}
          sha256: ${{ env.REVIEWDOG_SHA256 }}

      - name: Run actionlint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "${RUNNER_TEMP}/actionlint" -oneline -ignore 'unknown permission scope "models"' | "${RUNNER_TEMP}/reviewdog" -efm="%f:%l:%c: %m" -name="actionlint" -reporter="github-pr-review" -level="warning" -fail-on-error="true"

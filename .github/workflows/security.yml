name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # 毎週月曜 09:00 JST (= 00:00 UTC) に定期スキャンを実行する
    - cron: "0 0 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.21.2
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # commit 履歴を含めてスキャンするため fetch-depth: 0
          fetch-depth: 0
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Setup gitleaks
        uses: ./.github/actions/setup-gitleaks
        with:
          version: ${{ env.GITLEAKS_VERSION }}

      - name: Run gitleaks
        run: |
          "${RUNNER_TEMP}/gitleaks" detect --no-banner --redact --verbose --source .

  trivy-fs:
    name: Trivy (filesystem vulnerability scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TRIVY_VERSION: 0.70.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Setup Trivy
        uses: ./.github/actions/setup-trivy
        with:
          version: ${{ env.TRIVY_VERSION }}

      - name: Run Trivy filesystem scan
        run: |
          "${RUNNER_TEMP}/trivy" fs \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            .

  trivy-image:
    name: Trivy (Docker image vulnerability scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write
    env:
      TRIVY_VERSION: 0.70.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Setup Trivy
        uses: ./.github/actions/setup-trivy
        with:
          version: ${{ env.TRIVY_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        run: |
          for i in 1 2 3; do
            docker buildx build --load --cache-to type=gha,mode=max --cache-from type=gha -t trim-text:ci . && break
            [ $i -lt 3 ] && sleep $((i * 15))
          done

      - name: Run Trivy image scan
        run: |
          "${RUNNER_TEMP}/trivy" image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            trim-text:ci

name: Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: docker build (smoke test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          # Uncomment and configure the following to block unauthorized traffic
          # egress-policy: block
          # allowed-endpoints: >
          #   github.com:443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # トークンの永続化を無効化し、後続ステップへの認証情報残存リスクを低減する。
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        # docker buildx と gha キャッシュを利用し、同一 PR の後続ジョブや再実行でのビルドを高速化
        run: docker buildx build --load --cache-to type=gha,mode=max --cache-from type=gha -t trim-text:ci .

      - name: Smoke test (trim 1 char from each side)
        run: |
          set -eu
          actual=$(printf '1****\n*2***\n**3**\n***4*\n****5\n' \
            | docker run -i --rm trim-text:ci -t1 -b1 -l1 -r1)
          expected=$(printf '2**\n*3*\n**4')
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Smoke test failed"
            echo "expected:"
            echo "${expected}"
            echo "actual:"
            echo "${actual}"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Smoke test (no trim - should be no-op)
        run: |
          set -eu
          actual=$(printf 'abc\ndef\n' | docker run -i --rm trim-text:ci)
          expected=$(printf 'abc\ndef')
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::No-trim smoke test failed"
            echo "expected:"
            echo "${expected}"
            echo "actual:"
            echo "${actual}"
            exit 1
          fi
          echo "No-trim smoke test passed"

      - name: Smoke test (excessive trim - output should be empty)
        run: |
          set -eu
          actual=$(printf 'abc\n' | docker run -i --rm trim-text:ci -t10 -b10)
          if [ -n "${actual}" ]; then
            echo "::error::Excessive trim smoke test failed (expected empty output)"
            echo "actual:"
            echo "${actual}"
            exit 1
          fi
          echo "Excessive trim smoke test passed"

      - name: Smoke test (special chars and empty lines)
        run: |
          set -eu
          actual=$(printf '  hi  \n\n$$**\n' | docker run -i --rm trim-text:ci -l1 -r1)
          expected=$(printf ' hi \n\n$*')
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::Special chars / empty lines smoke test failed"
            echo "expected:"
            echo "${expected}"
            echo "actual:"
            echo "${actual}"
            exit 1
          fi
          echo "Special chars / empty lines smoke test passed"

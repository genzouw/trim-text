name: zizmor (GitHub Actions Security Scanner)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install zizmor
        working-directory: ${{ runner.temp }}
        env:
          ZIZMOR_VERSION: 1.3.1
          ZIZMOR_SHA256: 72d73be1b2383c847e09968417c80db18c6411516e87383daae846eece060b86
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            -o zizmor.tar.gz \
            "https://github.com/woodruffw/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-${ZIZMOR_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          echo "${ZIZMOR_SHA256}  zizmor.tar.gz" | sha256sum -c -
          tar xzf zizmor.tar.gz
          sudo mv zizmor-${ZIZMOR_VERSION}-x86_64-unknown-linux-musl/zizmor /usr/local/bin/

      - name: Run zizmor
        run: zizmor .github/workflows

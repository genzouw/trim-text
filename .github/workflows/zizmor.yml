name: zizmor (GitHub Actions Security Scanner)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install zizmor
        working-directory: ${{ runner.temp }}
        env:
          ZIZMOR_VERSION: 1.25.2
          ZIZMOR_SHA256: aa1facd105f0d83fe5c55b1adcd9d7417de5d83aa27471f91dc0b66cf3803577
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            -o zizmor.tar.gz \
            "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ZIZMOR_SHA256}  zizmor.tar.gz" | sha256sum -c -
          tar xzf zizmor.tar.gz
          sudo mv "zizmor" /usr/local/bin/

      - name: Run zizmor
        run: zizmor .github/workflows

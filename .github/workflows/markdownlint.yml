name: markdownlint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdownlint.yml"

concurrency:
  group: markdownlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # markdownlint-cli2 のバージョンは再現性確保のため固定する。
  MARKDOWNLINT_CLI2_VERSION: 0.22.1

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    # 既存ドキュメントの MD040/MD031 違反を片付けるまでは赤検知にしない。
    # 整備完了後に continue-on-error を外して赤検知に切り替える。
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # リポジトリの Actions 許可ポリシーが GitHub 所有 + Verified creator のみを許可するため、
      # 個人作者の DavidAnson/markdownlint-cli2-action は利用できない。
      # 代わりに npm から固定バージョンを直接実行する。
      - name: Run markdownlint-cli2
        run: npx --yes "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}" --config ".markdownlint-cli2.jsonc" "**/*.md"

name: actionlint

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint*"
      - ".github/scripts/verify-action-pins.sh"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint*"
      - ".github/scripts/verify-action-pins.sh"

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download actionlint
        id: actionlint
        run: |
          set -euo pipefail
          VERSION=1.7.12
          TARBALL="actionlint_${VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${TARBALL}"
          curl -fsSL -o /tmp/checksums.txt "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_checksums.txt"
          cd /tmp && grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar -xzf "/tmp/${TARBALL}" -C /tmp actionlint
          echo "executable=/tmp/actionlint" >> "$GITHUB_OUTPUT"

      - name: Run actionlint
        env:
          ACTIONLINT_BIN: ${{ steps.actionlint.outputs.executable }}
        run: |
          "${ACTIONLINT_BIN}" -color

      - name: Verify action pins resolve to commit SHAs
        env:
          # annotated tag object SHA を誤って pin した場合に startup_failure を防ぐ。
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .github/scripts/verify-action-pins.sh

name: actionlint

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint*"
      - ".github/scripts/verify-action-pins.sh"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint*"
      - ".github/scripts/verify-action-pins.sh"

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup actionlint
        uses: ./.github/actions/setup-actionlint
        with:
          version: 1.7.12

      - name: Run actionlint
        run: |
          "${RUNNER_TEMP}/actionlint" -color -ignore 'unknown permission scope "models"'

      - name: Verify action pins resolve to commit SHAs
        env:
          # annotated tag object SHA を誤って pin した場合に startup_failure を防ぐ。
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .github/scripts/verify-action-pins.sh

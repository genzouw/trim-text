name: Gemini AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-code-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/gemini-review'))
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Gemini AI Code Review
        uses: truongnh1992/gemini-ai-code-reviewer@v1.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-1.5-pro"
          prompt: "あなたはエキスパートのソフトウェアエンジニアです。以下のコード変更をレビューし、バグ、パフォーマンス問題、セキュリティの脆弱性、ベストプラクティスについて日本語で指摘してください。"

name: textlint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"

concurrency:
  group: textlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TEXTLINT_VERSION: 14.0.4
  TEXTLINT_RULE_PRESET_JA_TECHNICAL_WRITING_VERSION: 9.0.0

jobs:
  textlint:
    name: textlint (JTF Technical Writing)
    runs-on: ubuntu-latest
    # 既存ドキュメントの違反を片付けるまでは赤検知にしない。
    # 整備完了後に continue-on-error を外して赤検知に切り替える。
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Run textlint
        run: >
          npx --yes
          -p "textlint@${TEXTLINT_VERSION}"
          -p "textlint-rule-preset-ja-technical-writing@${TEXTLINT_RULE_PRESET_JA_TECHNICAL_WRITING_VERSION}"
          textlint "**/*.md"

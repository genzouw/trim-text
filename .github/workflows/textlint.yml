name: textlint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"

concurrency:
  group: textlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  textlint:
    name: textlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.1.6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.2
        with:
          node-version: 20

      - name: Install textlint and dependencies
        run: |
          npm install textlint@15 textlint-rule-preset-ja-technical-writing@12
          npm install @textlint/compiler@1

      - name: Run textlint with reviewdog
        uses: tsuyoshicho/action-textlint@cbc1bea0dbb649d7b642168ca8a80e8a57bb56d0 # v3.11.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          fail_on_error: true
          textlint_flags: "**/*.md"

name: Textlint

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  textlint:
    name: Textlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 既存ドキュメントの違反を片付けるまでは赤検知にしない。
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.0
        with:
          persist-credentials: false

      - name: Run textlint
        run: npx --yes -p textlint -p textlint-rule-preset-ja-technical-writing textlint "**/*.md"

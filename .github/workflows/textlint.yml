name: textlint (Japanese Technical Writing)

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/textlint.yml'
      - '.textlintrc.json'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/textlint.yml'
      - '.textlintrc.json'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: textlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  textlint:
    name: textlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: textlint with reviewdog
        uses: tsuyoshicho/action-textlint@cbc1bea0dbb649d7b642168ca8a80e8a57bb56d0 # v3.11.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          level: warning
          fail_on_error: true
          textlint_flags: "**/*.md"
          package_manager: npm

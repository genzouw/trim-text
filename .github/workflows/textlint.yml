name: textlint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".textlintrc.json"
      - ".github/workflows/textlint.yml"

concurrency:
  group: textlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # reviewdog のバージョンは再現性確保のため固定する。
  REVIEWDOG_VERSION: 0.21.0
  # reviewdog v0.21.0 linux_amd64 の公式 SHA256
  REVIEWDOG_SHA256: ad5ce7d5ffa52aaa7ec8710a8fa764181b6cecaab843cc791e1cce1680381569

jobs:
  textlint:
    name: textlint
    runs-on: ubuntu-latest
    # reviewdog による PR レビューコメント投稿のための最小権限。
    permissions:
      contents: read
      pull-requests: write
    # 既存ドキュメントの違反を片付けるまでは赤検知にしない。
    # 整備完了後に continue-on-error を外して赤検知に切り替える。
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Install textlint and presets
        run: npm init -y && npm install textlint textlint-rule-preset-ja-technical-writing textlint-filter-rule-comments

      - name: Install reviewdog
        working-directory: ${{ runner.temp }}
        run: |
          set -eu
          # 供給網攻撃対策として公式の checksums と SHA256 で整合性検証を行う。
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors --retry-delay 2 \
            --connect-timeout 10 --max-time 120 \
            -o reviewdog.tar.gz \
            "https://github.com/reviewdog/reviewdog/releases/download/v${REVIEWDOG_VERSION}/reviewdog_${REVIEWDOG_VERSION}_Linux_x86_64.tar.gz"
          echo "${REVIEWDOG_SHA256}  reviewdog.tar.gz" | sha256sum -c -
          tar xzf reviewdog.tar.gz reviewdog

      - name: Run textlint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx textlint -f checkstyle "**/*.md" | "${RUNNER_TEMP}/reviewdog" -f=checkstyle -name="textlint" -reporter="github-pr-review" -level="warning" -fail-on-error="true"

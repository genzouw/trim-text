name: Repomix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  repomix:
    name: Generate LLM Context with Repomix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Run Repomix (XML)
        run: |
          npx --yes repomix --output repomix-output.xml --style xml

      - name: Run Repomix (Markdown for llms.txt)
        run: |
          mkdir -p public
          npx --yes repomix --output public/llms-full.txt --style markdown
          echo "# trim-text Context" > public/llms.txt
          echo "This repository contains the trim-text CLI tool. See [llms-full.txt](llms-full.txt) for the full context." >> public/llms.txt

      - name: Upload Repomix Output (XML)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repomix-output
          path: repomix-output.xml
          retention-days: 7

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: public/

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: repomix
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

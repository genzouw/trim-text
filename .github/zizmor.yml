# zizmor の設定
# 参考: https://docs.zizmor.sh/configuration/

rules:
  # labeler.yml は actions/labeler でフォーク PR にもラベルを付けるため
  # pull_request_target が必須。チェックアウトは persist-credentials: false
  # を設定済みで、PR 由来のコードを実行しない安全な構成のため抑止する。
  dangerous-triggers:
    ignore:
      - labeler.yml
      # semantic-pull-request.yml は amannn/action-semantic-pull-request で
      # フォーク PR のタイトルも検証し statuses への書き込みが必要なため
      # pull_request_target が必須。PR 由来のコードをチェックアウト・実行せず
      # PR タイトルを読むだけの安全な構成のため抑止する。
      - semantic-pull-request.yml
